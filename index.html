<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina</title>
  <link rel="icon" href="img/lumina-favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Julius+Sans+One&family=Teachers:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <img src="img/lumina-logo.svg" alt="Lumina Logo" class="logo">
    <img src="img/menu-button.svg" alt="Menu" class="menu-icon">
  </header>

  <main class="container">
    
    <div class="left-side">
      <h1 class="main-title">CONNECT.<br>SHARE.<br>ENJOY.</h1>
      <div class="orange-circle"></div>
      <img src="img/waves.png" class="wave-line1">
      <img src="img/halo-air-red.png" class="speaker">
    </div>

    <div class="right-side">
      <h2 class="product-title">LUMINA | Halo Air</h2>
      <p class="product-text">
        Light enough to take anywhere,<br> loud enough to fill the moment.<br> 
        Choose your color, press play,<br> and enjoy hours of uninterrupted<br> listening.
      </p>
      <div class="button-group">
        <a href="#" class="btn-orange">Buy now</a>
        <a href="#" class="btn-outline">Learn more</a>
      </div>
    </div>

  </main>

<script src="js/script.js"></script> 
</body>
</html>
